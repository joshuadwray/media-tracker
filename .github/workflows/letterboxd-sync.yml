# Daily one-way sync of the public Letterboxd diary RSS into
# watching/log.json, then a diary rebuild in the same run (the bot's
# GITHUB_TOKEN push can't trigger build-lists.yml). build-lists.yml's
# watching/log.json path filter only catches user hand-edits.

name: letterboxd-sync

on:
  schedule:
    - cron: "0 18 * * *"  # ~1pm Central, clear of the 13/23 UTC checks
  workflow_dispatch: {}

permissions:
  contents: write

# Same group as the scheduled check / build-lists so syncs never race
# a run that commits state back.
concurrency:
  group: media-tracker
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Sync Letterboxd diary
        run: python -m tracker letterboxd

      # rebuild the diary here because this bot push (GITHUB_TOKEN) does
      # NOT trigger build-lists.yml — new films must render in the same run
      - name: Render diary pages
        run: python -m tracker reading

      - name: Commit log + rendered diary if changed
        run: |
          git config user.name "media-tracker bot"
          git config user.email "actions@users.noreply.github.com"
          git add watching/log.json docs/reading/ docs/watching/ reading/pagecount-cache.json lists/covers-cache.json
          git diff --cached --quiet || git commit -m "letterboxd: sync $(date -u +%Y-%m-%dT%H:%M)"
          git push
