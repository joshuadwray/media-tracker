# Rebuild the list pages whenever a list YAML changes, and commit the
# rendered docs/lists/ + cover cache back. This makes the publish flow
# "edit lists/*.yaml anywhere (incl. github.com mobile editor), push,
# done" — no local build needed.
#
# Only *.yaml triggers this: the bot's own commit touches
# lists/covers-cache.json and docs/lists/, which don't match, and
# GITHUB_TOKEN pushes don't re-trigger workflows anyway.

name: build-lists

on:
  push:
    branches: [main]
    paths: ["lists/*.yaml"]
  workflow_dispatch: {}

permissions:
  contents: write

# Same group as the scheduled check so a rebuild never races a run that
# commits state back.
concurrency:
  group: media-tracker
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Render list pages (covers cached)
        run: python -m tracker lists

      - name: Commit rendered pages + cover cache
        run: |
          git config user.name "media-tracker bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/lists/ lists/covers-cache.json
          git diff --cached --quiet || git commit -m "lists: rebuild $(date -u +%Y-%m-%dT%H:%M)"
          git push
