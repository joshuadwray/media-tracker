# Rebuild the list AND reading pages whenever a list YAML or the reading
# log changes, and commit the rendered docs/ + caches back. One combined
# build because they cross-reference: list tiles link to reading pages,
# and reading pages reuse the lists cover cache.
#
# Only lists/*.yaml and reading/log.json trigger this: the bot's own
# commit touches the caches and docs/, which don't match, and
# GITHUB_TOKEN pushes don't re-trigger workflows anyway.

name: build-lists

on:
  push:
    branches: [main]
    paths: ["lists/*.yaml", "reading/log.json", "watching/log.json"]
  workflow_dispatch: {}

permissions:
  contents: write

# Same group as the scheduled check so a rebuild never races a run that
# commits state back.
concurrency:
  group: media-tracker
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Render list pages (covers cached)
        run: python -m tracker lists

      # after lists so listed books' covers are already cached — the
      # ISBN bridge then needs zero iTunes calls for them
      - name: Render reading pages (page counts cached)
        run: python -m tracker reading

      - name: Commit rendered pages + caches
        run: |
          git config user.name "media-tracker bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/lists/ docs/reading/ docs/watching/ lists/covers-cache.json reading/pagecount-cache.json
          git diff --cached --quiet || git commit -m "lists: rebuild $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
