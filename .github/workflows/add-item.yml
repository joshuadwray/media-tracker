# Mobile add flow: triggered by docs/add.html (GitHub Pages) via the
# workflow_dispatch API. Verifies books against live catalogs, commits the
# watchlist change, then runs an immediate check so the ntfy confirmation
# and any sightings land on your phone within a minute or two.

name: add-item
run-name: "add ${{ inputs.kind }}: ${{ inputs.title }}"

on:
  workflow_dispatch:
    inputs:
      kind:
        description: what kind of item
        required: true
        type: choice
        options: [book, movie]
      title:
        description: title (as best you know it)
        required: true
        type: string
      year:
        description: release year (movies only, optional)
        required: false
        type: string

permissions:
  contents: write

# Per-run concurrency: each dispatch gets its own slot so rapid-fire adds
# don't cancel each other (GitHub's single-slot queue drops middle runs).
# Race with scheduled checks is handled by pull --rebase before push.
concurrency:
  group: media-tracker-add-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  add:
    runs-on: ubuntu-latest
    env:
      KIND: ${{ inputs.kind }}
      TITLE: ${{ inputs.title }}
      YEAR: ${{ inputs.year }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Add item and commit
        run: |
          git config user.name "media-tracker bot"
          git config user.email "actions@users.noreply.github.com"
          add_args=(add "$KIND" "$TITLE" --auto)
          [ -n "$YEAR" ] && add_args+=(--year "$YEAR")
          python -m tracker "${add_args[@]}"

          # Retry loop: parallel runs may conflict on watchlist.yaml.
          # On conflict, reset to origin, re-run add (dupe guard is safe),
          # and try again.
          for attempt in 1 2 3 4 5; do
            git add watchlist.yaml
            if [ -f state/pending-pins.json ]; then git add state/pending-pins.json; fi
            git diff --cached --quiet || git commit -m "add $KIND: $TITLE (mobile)"
            if git pull --rebase origin main && git push; then
              break
            fi
            echo "::warning::Push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            git reset --hard origin/main
            git pull origin main
            python -m tracker "${add_args[@]}"
            sleep "$((attempt * 2))"
          done

      - name: Run immediate check and commit
        env:
          THEATER_LOOKAHEAD: "21"
        run: |
          # Retry loop: parallel runs may conflict on state files.
          # Re-running check on fresh state is safe/idempotent.
          for attempt in 1 2 3 4 5; do
            python -m tracker check
            git add state/ docs/
            git diff --cached --quiet || git commit -m "state: $(date -u +%Y-%m-%dT%H:%M)"
            if git pull --rebase origin main && git push; then
              break
            fi
            echo "::warning::State push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            git reset --hard origin/main
            git pull origin main
            sleep "$((attempt * 2))"
          done

      - name: Notify failure
        if: failure()
        run: |
          [ -n "$NTFY_TOPIC" ] && curl -s \
            -H "Title: watchlist add failed" -H "Tags: warning" \
            -d "add $KIND: $TITLE failed — check the Actions log" \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null
