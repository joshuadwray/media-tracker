# ============================================================
# media-tracker watchlist
# Edit freely — or use the guardrailed adder, which verifies the
# title against live catalog records and stores canonical IDs:
#   python -m tracker add book "nickel boys"
#   python -m tracker add movie "the substance" --year 2024
# ============================================================

books:
  - title: Eradication
    author: Miles, Jonathan
    bib_id: S127C1981113
  - title: We Were Forbidden
    author: Harpman, Jacqueline, Schwartz, Ros
    isbn: 9798893380576
  - title: Dead but Dreaming of Electric Sheep
    author: Tremblay, Paul
    bib_id: S127C1979611
  - title: "Attention-Seeking Behavior: A Novel"
    author: Varfis-van Warmelo, Aea
    isbn: 9781644453919
  - title: one leg on earth
  # - title: The Nickel Boys
  #   author: Colson Whitehead
  #   isbn: "9780385537070"     # optional: makes library matching exact
  #   bib_id: "S1234567"        # optional: exact BiblioCommons record (set by `tracker add`)

movies:
  - title: wild horse nine
    year: 2026
  # - title: The Substance
  #   year: 2024

streaming:
  # TMDB provider names (case-insensitive). Rent/buy always notified.
  services: [Netflix, Hulu, HBO Max, Apple TV Plus, Disney Plus, Amazon Prime Video]

sources:
  denton-library:
    kind: bibliocommons
    library: denton              # https://denton.bibliocommons.com
    # EBOOK/AUDIOBOOK excluded — Denton's digital side is cloudLibrary,
    # which we watch separately, so those would be duplicate notifs.
    # AB = audiobook on CD (physical), which cloudLibrary doesn't cover.
    formats: [BK, AB]

  cloudlibrary:
    kind: cloudlibrary
    # Your cloudLibrary id is in the URL you use to log in:
    # https://ebook.yourcloudlibrary.com/library/<THIS PART>/...
    # Case-sensitive! Wrong case redirects to the marketing site.
    library: Denton

  texas-theatre:
    kind: pages
    pages:
      - name: Texas Theatre
        url: https://thetexastheatre.com/

  # Angelika Dallas: parked. The site is a client-rendered React app (page
  # text is just "Movie Information | Tickets | Showtimes") and its backend
  # (production-api.readingcinemas.com) requires a bearer token behind a
  # reCAPTCHA flow — no clean, polite way to watch it as of 2026-07.
  # angelika:
  #   kind: pages
  #   pages:
  #     - name: Angelika Dallas
  #       url: https://angelikafilmcenter.com/dallas

  cinemark:
    kind: cinemark
    theatres:
      # Verify each URL by loading it in a browser, then run:
      #   python -m tracker probe --source cinemark
      - name: Cinemark Denton 14
        url: https://www.cinemark.com/theatres/tx-denton/cinemark-denton-14
      - name: Cinemark West Plano
        url: https://www.cinemark.com/theatres/tx-plano/cinemark-west-plano-and-xd
      - name: Cinemark Dallas IMAX
        url: https://www.cinemark.com/theatres/tx-dallas/cinemark-dallas-xd-and-imax

  amc:
    kind: amc
    theatres:
      - name: AMC Stonebriar 24
        url: https://www.amctheatres.com/movie-theatres/dallas-ft-worth/amc-dine-in-stonebriar-24/showtimes
      - name: AMC Grapevine Mills 30
        url: https://www.amctheatres.com/movie-theatres/dallas-ft-worth/amc-grapevine-mills-30/showtimes
      - name: AMC Northpark 15
        url: https://www.amctheatres.com/movie-theatres/dallas-ft-worth/amc-northpark-15/showtimes

  # Alamo has the cleanest showtime feed in the metro (one JSON request
  # covers every DFW location) — flip enabled to true to include it.
  alamo:
    kind: drafthouse
    market: dfw
    enabled: false

state_file: state/state.json
